<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ImmoRadar v3.3.0</title>
    <!-- Map Engine (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* Force Power v3.3.0 */
        if (!localStorage.getItem('v330_reset')) {
            localStorage.clear();
            localStorage.setItem('v330_reset', 'done');
            window.location.reload(true);
        }
    </script>
</head>
<body>
    <div id="app">
        <!-- HEADER TARGET UI -->
        <header class="main-header">
            <div class="header-left">
                <h1 class="logo-text">Immo<span class="radar-text">Radar</span></h1>
                <p class="location-text">Hauts-de-Seine · 92 Sud</p>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="icon-btn" onclick="app.sync()"><i data-lucide="refresh-cw"></i></button>
                    <div class="notif-bell">
                        <i data-lucide="bell"></i>
                        <span id="notif-badge" class="badge">0</span>
                    </div>
                </div>
            </div>
        </header>

        <main id="app-content">
            
            <!-- WALL LOGIN -->
            <section id="login-wall" class="view" style="display:none;">
                <div class="login-center">
                    <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Initialisation v3.3.0</h2>
                    <p style="opacity: 0.6; margin-bottom: 30px;">Prêt pour la prospection</p>
                    <a id="btn-auth" href="#" class="btn-primary-target" style="background:#FFF; color:#000;">SE CONNECTER</a>
                </div>
            </section>

            <!-- AUTH CONTENT -->
            <section id="main-ui" style="display:none;">
                
                <!-- USER WELCOME BLOCK -->
                <div class="welcome-card">
                    <div class="avatar-circle">MA</div>
                    <div class="welcome-text">
                        <h3>Bonjour, Marie Astrid 👋</h3>
                        <p><span id="stat-listings">0</span> annonces détectées aujourd'hui</p>
                    </div>
                </div>

                <!-- RADAR TOGGLE BAR -->
                <div class="radar-status-bar">
                    <div class="radar-info">
                        <span class="dot-green"></span>
                        <p>Radar Vision Totale v3.3.0 actif</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked disabled>
                        <span class="slider round"></span>
                    </label>
                </div>

                <!-- LISTING VIEW -->
                <div id="view-annonces" class="view">
                    <div class="filter-pills">
                        <button class="pill active" onclick="app.setFilter('all')">Tous</button>
                        <button class="pill" onclick="app.setFilter('Appartement')">Appt.</button>
                        <button class="pill" onclick="app.setFilter('Maison')">Maison</button>
                    </div>
                    <div id="alerts-list" class="listings-grid">
                        <div class="loader-container">
                            <h3>Radar en cours...</h3>
                            <p id="diagnostic-text" style="font-size:0.6rem; opacity:0.6; padding-top:10px;">Diagnostic GMail v3.3.0</p>
                        </div>
                    </div>
                </div>

                <!-- MAP VIEW -->
                <div id="view-carte" class="view hidden">
                    <div id="map-container">
                        <div id="map"></div>
                        <div class="map-controls">
                            <button id="btn-gen-tour" class="btn-tour-gen" onclick="app.generateTour()">
                                <i data-lucide="navigation"></i> GÉNÉRER LA TOURNÉE (<span id="tour-count">0</span>)
                            </button>
                        </div>
                    </div>
                </div>

                <!-- FAVORITES VIEW -->
                <div id="view-favoris" class="view hidden">
                    <div id="favorites-list" class="listings-grid"></div>
                </div>

            </section>
        </main>

        <!-- TARGET TAB BAR -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="app.switchView('annonces')">
                <i data-lucide="clipboard-list"></i>
                <span>Annonces</span>
            </button>
            <button class="nav-item" onclick="app.switchView('carte')">
                <i data-lucide="map"></i>
                <span>Carte</span>
            </button>
            <button class="nav-item" onclick="app.switchView('favoris')">
                <i data-lucide="heart"></i>
                <span>Favoris</span>
            </button>
            <button class="nav-item" onclick="app.switchView('alertes')">
                <i data-lucide="bell"></i>
                <span>Alertes</span>
            </button>
        </nav>
    </div>

    <!-- ENGINE v3.3.0 "Restauration" -->
    <script src="engine.js?v=3.3.0_FINAL"></script>
    <script> lucide.createIcons(); </script>
</body>
</html>
