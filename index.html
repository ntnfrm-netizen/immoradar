<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMMORADAR v3.0.2</title>
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        /* Force Deep v3.0.2 */
        if (!localStorage.getItem('v302_reset')) {
            localStorage.clear();
            localStorage.setItem('v302_reset', 'done');
            window.location.reload(true);
        }
    </script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo-box">
                <img src="logo.png" alt="Logo" class="logo-hd">
                <h1>IMMORADAR <span class="version-tag">v3.0.2</span></h1>
            </div>
            <div class="header-tools">
                <button class="sync-trigger" onclick="app.sync()">
                    <i data-lucide="refresh-cw"></i>
                </button>
                <button class="logout-trigger" onclick="app.logout()">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <main id="app-viewport">
            <section id="login-wall" class="login-screen" style="display:none;">
                <div class="login-hero">
                    <img src="logo.png" alt="IMMORADAR" class="hero-logo">
                    <h2>Bienvenue Marie-Astrid</h2>
                    <p>Connectez votre Gmail pour activer la veille.</p>
                </div>
                <div class="login-actions">
                    <a id="btn-auth" href="#" class="btn-google-luxury">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
                        CONNEXION GMAIL
                    </a>
                </div>
            </section>

            <section id="main-content" class="authenticated-ui" style="display:none;">
                <div id="view-alerts" class="view">
                    <div class="view-header">
                        <h2>Opportunités SeLoger</h2>
                        <span class="view-subtitle">Détection 92 & Environs</span>
                    </div>
                    <div id="alerts-list" class="property-grid"></div>
                </div>

                <div id="view-map" class="view hidden">
                    <div class="view-header">
                        <h2>Géolocalisation</h2>
                        <span id="map-count" class="view-subtitle">-</span>
                    </div>
                    <div class="map-container-hd">
                        <div class="map-placeholder">
                            <i data-lucide="map-pin"></i>
                            <p>Analyse de la situation géographique des biens en cours.</p>
                        </div>
                    </div>
                </div>

                <div id="view-favorites" class="view hidden">
                    <div class="view-header">
                        <h2>Coups de Cœur</h2>
                    </div>
                    <div id="favorites-list" class="property-grid"></div>
                </div>
            </section>
        </main>

        <nav class="app-navbar">
            <button class="tab-item active" onclick="app.switchView('alerts')">
                <i data-lucide="bell"></i>
                <span>Alertes</span>
            </button>
            <button class="tab-item" onclick="app.switchView('map')">
                <i data-lucide="map"></i>
                <span>Carte</span>
            </button>
            <button class="tab-item" onclick="app.switchView('favorites')">
                <i data-lucide="heart"></i>
                <span>Favoris</span>
            </button>
        </nav>
    </div>

    <script src="engine.js?v=3.0.2_DEEP"></script>
    <script> lucide.createIcons(); </script>
</body>
</html>
